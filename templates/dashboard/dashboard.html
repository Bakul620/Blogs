{% extends 'base.html' %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<div class="row mt-4">
    {% include 'dashboard/sidebar.html' %}
    
	<div class="col-md-9">
		<h3 class="pb-2 mb-4 border-bottom text-warning text-center" style="letter-spacing: 2px;">Dashboard Summary</h3>
		<span class="text-muted text-left d-block mb-4">welcome <b>{{ user }}</b></span>
		<div class="row">
			<div class="col">
				<div class="card border-default mb-3">
					<div class="card-header text-center text-uppercase font-weight-bold">all Categories</div>   
                        <div class="card-body text-dark">
                          <h5 class="card-title text-center">{{ category_count }}</h5>
					    </div>
				    </div>
			    </div>
			<div class="col">
				<div class="card border-default mb-3">
                    <div class="card-header text-center text-uppercase font-weight-bold">all Posts</div>
					<div class="card-body text-dark">
						<h5 class="card-title text-center">{{ post_count }}</h5>
					</div>
				</div>
			</div>
		</div>
	</div>
</div>
{% endblock %}
