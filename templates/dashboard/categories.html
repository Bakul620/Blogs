{% extends 'base.html' %}

{% block content %}
<div class="row mt-4">
    {% include 'dashboard/sidebar.html' %}

	<div class="col-md-9">
        <h2> All Categories </h2>
        <a href="{% url 'add_category' %}" class="btn btn-dark text-light mb-2 float-right">Add New</a>
	    <table class="table table-hover">
            <thead>
                <tr>
                    <th >#</th>
                    <th >Category Name</th>
                    <th >Created At</th>
                    <th >Updated At</th>
                    <th >Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for cat in categories %}
                    <tr>
                        <td >{{ forloop.counter }}</td>
                        <td >{{ cat }}</td>
                        <td >{{ cat.Created_at }}</td>
                        <td >{{ cat.Updated_at }}</td>
                        <td >
                            <a href="{% url 'edit_category' cat.id %}" ><i class="fa fa-edit btn-primary"></i></a> &nbsp;
                            <a href="{% url 'delete_category' cat.id %}" ><i class="fa fa-trash btn-sm btn-danger"></i></a>
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
	</div>
</div>
{% endblock %}
